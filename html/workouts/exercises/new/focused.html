<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Exercise</title>
  <link rel="stylesheet" href="/assets/styles/index.css">
  <style>
    form-field {
      ul {
        border-radius: var(--border-radius-pill);
        padding: 0.5rem 0.4rem;

        border: 0.05rem solid darkgray;
        li {
          padding: 0 0.6rem;
        }
        li:hover {
          background-color: lightyellow; 
        }
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>New Exercise</h1> 
  </header>
  <main>
    <form method="post">
      <fieldset>
        <form-field>
          <label for="name">Exercise Name</label>
          <input id="name"
            name="name"
            placeholder="Search or add new..."
            autocomplete="off">
          <ul>
            <li>
              <span>Squats</span>
              <span>weights</span>
            </li>
            <li>
              <span>Arm Curls</span>
              <span">weights</span>
            </li>
          </ul>
          <!-- <p>New exercise — will be added to the list on save.</p> -->
        </form-field>
        <form-field>
          <legend>
            Exercise Type
          </legend>
          <label>
            <input type="radio" name="exerciseType" value="weights">
            Weights
          </label>
          <label>
            <input type="radio" name="exerciseType" value="cardio">
            Cardio
          </label>
        </form-field>
      </fieldset>
    </form>
  </main>
</body>
</html>
