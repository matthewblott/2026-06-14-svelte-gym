<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Exercise</title>
  <link rel="stylesheet" href="/assets/styles/index.css">
</head>
<body>
  <header>
    <h1>New Exercise</h1> 
  </header>
  <main>
    <form method="post">
      <fieldset>
        <form-field>
          <label for="name">Exercise Name</label>
          <input id="name" name="name" placeholder="Name"> 
        </form-field>
      </fieldset>
      <fieldset>
        <form-field>
          <legend>
            Exercise Type
          </legend>
          <label>
            <input type="radio" name="exerciseType" value="weights">
            Weights
          </label>
          <label>
            <input type="radio" name="exerciseType" value="cardio">
            Cardio
          </label>
        </form-field>
      </fieldset>
    </form>
  </main>
</body>
</html>
